<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Roller Derby League</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #050505; height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; }
        .countdown { display: flex; gap: 20px; justify-content: center; margin: 40px 0; }
        .count-item { background: var(--bg-card); border: 1px solid var(--glass-border); padding: 20px; border-radius: 15px; min-width: 100px; }
        .count-item h2 { font-size: 32px; color: var(--primary-neon); }
        .count-item p { font-size: 12px; color: var(--text-gray); text-transform: uppercase; }
    </style>
</head>
<body class="dark-mode">

    <div class="container" data-reveal>
        <a href="index.html" class="logo" style="margin-bottom: 30px; justify-content: center;">
            <i class="fas fa-skating neon-text"></i>
            ROLLER<span>DERBY</span>
        </a>
        <h1 style="font-size: 50px; margin-bottom: 10px;">LACING <span class="neon-text">UP...</span></h1>
        <p style="color: var(--text-gray);">Our new arena is almost ready. Stay tuned for the grand opening.</p>
        
        <div class="countdown">
            <div class="count-item"><h2>24</h2><p>Days</p></div>
            <div class="count-item"><h2>12</h2><p>Hours</p></div>
            <div class="count-item"><h2>45</h2><p>Mins</p></div>
            <div class="count-item"><h2>08</h2><p>Secs</p></div>
        </div>
        
        <div style="max-width: 500px; margin: 0 auto;">
            <p style="margin-bottom: 20px; font-size: 14px; color: var(--text-gray);">Be the first to know when we launch.</p>
            <form style="display: flex; gap: 10px;">
                <input type="email" placeholder="Email Address" style="background: var(--bg-dark); border: 1px solid var(--glass-border); padding: 15px; border-radius: 10px; color: white; flex: 1;">
                <button type="submit" class="btn-primary">Notify Me</button>
            </form>
        </div>
        
        <div class="social-icons" style="justify-content: center; margin-top: 50px;">
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fab fa-facebook-f"></i></a>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script>
        document.body.classList.add('loaded');
        // Simple countdown logic simulation
        setInterval(() => {
            const secs = document.querySelector('.count-item:last-child h2');
            let s = parseInt(secs.innerText);
            if (s > 0) secs.innerText = (s - 1).toString().padStart(2, '0');
            else secs.innerText = "59";
        }, 1000);
    </script>
</body>
</html>
