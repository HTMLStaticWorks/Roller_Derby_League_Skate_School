<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Roller Derby League & Skate School</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg?v=1">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: var(--bg-dark); height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; transition: var(--transition); }
        .auth-container {
            width: 100%;
            max-width: 500px;
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            background: var(--bg-light);
            position: relative;
            transition: var(--transition);
        }
        .auth-container::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, var(--primary-neon), var(--secondary-neon));
            z-index: -1;
            border-radius: 32px;
            opacity: 0.3;
        }
        .auth-form {
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .auth-input {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            padding: 15px;
            border-radius: 12px;
            color: var(--text-white);
            margin-bottom: 20px;
            outline: none;
            transition: var(--transition);
        }
        .auth-input:focus { border-color: var(--primary-neon); background: rgba(255,255,255,0.1); box-shadow: 0 0 15px rgba(255, 0, 127, 0.2); }
        
        .logo-center {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        /* Dark Mode Style for Auth Container */
        body.dark-mode .auth-container {
            background: var(--bg-alt);
        }
        .or-divider-text {
            background: var(--bg-light);
        }
        body.dark-mode .or-divider-text {
            background: var(--bg-alt) !important;
        }

        @media (max-width: 480px) {
            body { flex-direction: column; height: auto; padding: 40px 20px; }
            .auth-form { padding: 30px 20px; }
            .auth-container { border-radius: 20px; }
            .auth-controls { 
                position: static !important; 
                margin-bottom: 20px; 
                justify-content: flex-end;
                width: 100%;
            }
            .auth-options { 
                font-size: 12px !important; 
                gap: 5px !important;
            }
            .social-grid { gap: 10px !important; }
            .social-grid .btn-outline { padding: 12px 5px !important; font-size: 11px !important; }
        }

        .auth-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .toggle-password {
            position: absolute;
            right: 15px;
            cursor: pointer;
            color: var(--text-gray);
            z-index: 10;
            top: 50%;
            transform: translateY(-50%);
        }
        .auth-input { margin-bottom: 0 !important; }
        .password-wrapper { margin-bottom: 20px; }
    </style>
</head>
<body class="dark-mode">

    <div class="auth-controls">
        <button class="toggle-btn" id="dark-mode-toggle" title="Toggle Theme">
            <i class="fas fa-moon"></i>
        </button>
        <button class="toggle-btn" id="rtl-toggle" title="Toggle RTL">
            <i class="fas fa-right-left"></i>
        </button>
    </div>

    <div class="auth-container">
        <div class="auth-form">
            <div class="logo-center">
                <a href="index.html" class="logo">
                    <i class="fas fa-skating neon-text"></i>
                    ROLLER<span>DERBY</span>
                </a>
            </div>
            
            <h2 style="text-align: center; margin-bottom: 10px;">WELCOME <span class="neon-text">BACK</span></h2>
            <p style="text-align: center; color: var(--text-gray); margin-bottom: 30px;">Sign in to your athlete account</p>

            <form>
                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-gray);">Email Address</label>
                    <input type="email" class="auth-input" placeholder="name@example.com" required>
                </div>
                
                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-gray);">Password</label>
                    <div class="password-wrapper">
                        <input type="password" class="auth-input" placeholder="••••••••" required>
                        <i class="fas fa-eye toggle-password"></i>
                    </div>
                </div>
                
                <div class="auth-options" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; font-size: 14px;">
                    <label style="color: var(--text-gray); display: flex; align-items: center; gap: 8px; cursor: pointer;">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" style="color: var(--primary-neon); text-decoration: none;">Forgot Password?</a>
                </div>
                
                <button type="submit" class="btn-primary" style="width: 100%; padding: 15px;">Sign In</button>
                
                <div style="text-align: center; margin: 30px 0; position: relative;">
                    <span class="or-divider-text" style="padding: 0 15px; position: relative; z-index: 1; color: var(--text-gray); font-size: 12px;">OR CONTINUE WITH</span>
                    <hr style="position: absolute; top: 50%; width: 100%; border: none; border-top: 1px solid var(--glass-border);">
                </div>
                
                <div class="social-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <a href="#" class="btn-outline" style="font-size: 12px; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; text-transform: uppercase;">
                        <i class="fab fa-google"></i> Google
                    </a>
                    <a href="#" class="btn-outline" style="font-size: 12px; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; text-transform: uppercase;">
                        <i class="fab fa-apple"></i> Apple
                    </a>
                </div>
                
                <p style="text-align: center; margin-top: 30px; font-size: 14px; color: var(--text-gray);">
                    Don't have an account? <a href="register.html" style="color: var(--secondary-neon); text-decoration: none; font-weight: 700;">Sign Up</a>
                </p>
            </form>
        </div>
    </div>


    <script src="assets/js/main.js"></script>
    <script>
        document.body.classList.add('loaded');
    </script>

    <!-- Back to Top -->
    <a href="#" class="back-to-top" id="backToTop">
        <i class="fas fa-arrow-up"></i>
    </a>
</body>
</html>
