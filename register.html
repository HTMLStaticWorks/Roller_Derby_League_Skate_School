<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Roller Derby League & Skate School</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #050505; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        .auth-container {
            width: 100%;
            max-width: 550px;
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            background: #0a0a0c;
            position: relative;
        }
        .auth-container::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, var(--secondary-neon), var(--primary-neon));
            z-index: -1;
            border-radius: 32px;
            opacity: 0.3;
        }
        .auth-form {
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .auth-input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            padding: 12px;
            border-radius: 12px;
            color: white;
            margin-bottom: 15px;
            outline: none;
            transition: var(--transition);
        }
        .auth-input:focus { border-color: var(--secondary-neon); background: rgba(255,255,255,0.1); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }
        
        .strength-meter {
            height: 4px;
            background: var(--glass-border);
            margin-top: -8px;
            margin-bottom: 15px;
            border-radius: 2px;
            overflow: hidden;
        }
        .strength-bar { width: 60%; height: 100%; background: var(--secondary-neon); }

        .logo-center {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }
    </style>
</head>
<body class="dark-mode">

    <div class="auth-container">
        <div class="auth-form">
            <div class="logo-center">
                <a href="index.html" class="logo">
                    <i class="fas fa-skating neon-text"></i>
                    ROLLER<span>DERBY</span>
                </a>
            </div>
            
            <h2 style="text-align: center; margin-bottom: 10px;">JOIN THE <span class="neon-text">LEAGUE</span></h2>
            <p style="text-align: center; color: var(--text-gray); margin-bottom: 30px;">Create your athlete profile today</p>
            
            <form>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 5px;">
                    <div>
                        <label style="display: block; margin-bottom: 5px; font-size: 12px; color: var(--text-gray);">First Name</label>
                        <input type="text" class="auth-input" placeholder="John" required>
                    </div>
                    <div>
                        <label style="display: block; margin-bottom: 5px; font-size: 12px; color: var(--text-gray);">Last Name</label>
                        <input type="text" class="auth-input" placeholder="Doe" required>
                    </div>
                </div>
                
                <div style="margin-bottom: 5px;">
                    <label style="display: block; margin-bottom: 5px; font-size: 12px; color: var(--text-gray);">Email Address</label>
                    <input type="email" class="auth-input" placeholder="name@example.com" required>
                </div>
                
                <div style="margin-bottom: 5px;">
                    <label style="display: block; margin-bottom: 5px; font-size: 12px; color: var(--text-gray);">Password</label>
                    <input type="password" class="auth-input" placeholder="••••••••" required>
                    <div class="strength-meter"><div class="strength-bar"></div></div>
                </div>
                
                <div style="margin-bottom: 5px;">
                    <label style="display: block; margin-bottom: 5px; font-size: 12px; color: var(--text-gray);">Confirm Password</label>
                    <input type="password" class="auth-input" placeholder="••••••••" required>
                </div>
                
                <label style="color: var(--text-gray); display: flex; align-items: flex-start; gap: 10px; cursor: pointer; font-size: 12px; margin: 15px 0 25px;">
                    <input type="checkbox" style="margin-top: 3px;" required> I agree to the Terms of Service and Privacy Policy, including the safety waiver.
                </label>
                
                <button type="submit" class="btn-primary" style="width: 100%; padding: 15px;">Create Account</button>
                
                <p style="text-align: center; margin-top: 30px; font-size: 14px; color: var(--text-gray);">
                    Already a member? <a href="login.html" style="color: var(--secondary-neon); text-decoration: none; font-weight: 700;">Login</a>
                </p>
            </form>
        </div>
    </div>


    <script src="assets/js/main.js"></script>
    <script>
        document.body.classList.add('loaded');
    </script>
</body>
</html>
